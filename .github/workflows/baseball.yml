name: Baseball Notifier

on:
  schedule:
    # 每 6 小時觸發新 long-running job(避開整點以減少 GHA 延遲)
    - cron: '7 */6 * * *'
  workflow_dispatch:

# 新 run 觸發時取消舊 run(配合 save-always cache,確保 state 在 cancel 時也存到)
concurrency:
  group: baseball-notifier
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    # 整個 job 上限 5h55m(6 小時減 5 分鐘 margin)
    timeout-minutes: 355
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # state.json 跨 run 共享。用 restore + save 分開,save 放後面 always() 確保 cancel/timeout 也存
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: baseball-state-${{ github.run_id }}
          restore-keys: |
            baseball-state-

      # 不靠 GHA cron(每 5 分鐘不準),改在 run 內 bash 迴圈呼叫 notifier
      # 跑 5h45m 然後乾淨退出,留時間給 cache save。下一個 cron 6 小時後接手
      # polling interval 由 baseball_notifier.py 寫進 state["_next_poll_interval"]:
      #   有比賽日 → 120s(2 分鐘)
      #   沒比賽日 → 600s(10 分鐘)
      - name: Polling loop
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DEFAULT_INTERVAL=120           # 預設 2 分鐘(有比賽);程式跑完會更新 state.json
          LOOP_DURATION=20700            # 5h45m,讓下一輪 cron(7 minute past)接得上
          END=$(( $(date +%s) + LOOP_DURATION ))
          CONSECUTIVE_FAILS=0
          ITERATION=0
          while [ $(date +%s) -lt $END ]; do
            ITERATION=$((ITERATION + 1))
            echo "::group::Iteration ${ITERATION} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            START=$(date +%s)
            if python baseball_notifier.py; then
              CONSECUTIVE_FAILS=0
              echo "::endgroup::"
            else
              EXIT_CODE=$?
              CONSECUTIVE_FAILS=$((CONSECUTIVE_FAILS + 1))
              echo "[ERR] iteration ${ITERATION} exited ${EXIT_CODE}, consecutive_fails=${CONSECUTIVE_FAILS}"
              echo "::endgroup::"
              # 只在第一次失敗推 TG(避免連續失敗 spam)
              if [ "$CONSECUTIVE_FAILS" = "1" ]; then
                MSG=$(printf '⚠️ Baseball Notifier 單輪失敗\nexit code: %s\nlog: %s\n迴圈仍在跑,稍後會再試' "${EXIT_CODE}" "${RUN_URL}")
                curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                  --data-urlencode "chat_id=${TG_CHAT_ID}" \
                  --data-urlencode "text=${MSG}" >/dev/null || true
              fi
            fi
            # 讀程式寫進 state.json 的下次 polling interval(有比賽 120s / 沒比賽 600s)
            POLL_INTERVAL=$(python3 -c "import json,sys; sys.stdout.write(str(json.load(open('state.json')).get('_next_poll_interval', $DEFAULT_INTERVAL)))" 2>/dev/null || echo $DEFAULT_INTERVAL)
            ELAPSED=$(( $(date +%s) - START ))
            SLEEP=$(( POLL_INTERVAL - ELAPSED ))
            REMAINING=$(( END - $(date +%s) ))
            # 若離 LOOP_DURATION 結束時間少於下一次 polling,直接結束讓 cache save
            if [ $REMAINING -lt $POLL_INTERVAL ]; then
              echo "Loop ending: remaining ${REMAINING}s < interval ${POLL_INTERVAL}s"
              break
            fi
            echo "Next iteration in ${SLEEP}s (poll_interval=${POLL_INTERVAL}s, remaining=${REMAINING}s)"
            if [ $SLEEP -gt 0 ]; then
              sleep $SLEEP
            fi
          done
          echo "Loop finished after ${ITERATION} iterations"

      # 不論 success / failure / cancel,都把最新 state 存回 cache
      - name: Save state cache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: baseball-state-${{ github.run_id }}

      # workflow 整段失敗(不是單輪失敗 — 那個 loop 內部已處理)時推 TG
      - name: Notify Telegram on workflow failure
        if: ${{ failure() }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MSG=$(printf '🚨 Baseball Notifier workflow 整段失敗(非單輪失敗)\nrun id: %s\n時間: %s\n詳細 log: https://github.com/%s/actions/runs/%s\n請手動檢查並重新觸發 workflow' "${{ github.run_id }}" "$(date -u +'%Y-%m-%d %H:%M UTC')" "${{ github.repository }}" "${{ github.run_id }}")
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}" >/dev/null || true
