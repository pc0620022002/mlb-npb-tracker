name: Baseball Notifier

on:
  schedule:
    # 每 2 小時 fallback(主要靠 polling loop 內 self-trigger relay,cron 是保險)
    - cron: '17 */2 * * *'
  workflow_dispatch:

# self-trigger relay 需要 actions:write;cache 用 default contents:read 即可
permissions:
  contents: read
  actions: write

# 新 run 觸發時取消舊 run(配合 save-always cache,確保 state 在 cancel 時也存到)
concurrency:
  group: baseball-notifier
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    # 整個 job 上限 5h55m(6 小時減 5 分鐘 margin)
    timeout-minutes: 355
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # state.json 跨 run 共享。用 restore + save 分開,save 放後面 always() 確保 cancel/timeout 也存
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: baseball-state-${{ github.run_id }}
          restore-keys: |
            baseball-state-

      # 不靠 GHA cron 接力(實測延遲 1-2 小時,造成空白 stall)。
      # 改在 run 內主動 self-trigger 接力 run:跑到剩 RELAY_LEAD_TIME 時呼叫 GHA API
      # workflow_dispatch 觸發新 run,新 run 啟動後 concurrency cancel 舊 run,
      # 舊 run 的 save-always cache step 仍會 fire 把最新 state 存進去,新 run restore 接續。
      # cron `17 */2 * * *` 是 fallback,若 self-trigger 失敗也最多 2 小時恢復。
      - name: Polling loop
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          DEFAULT_INTERVAL=120           # 預設 2 分鐘(有比賽);程式跑完會更新 state.json
          LOOP_DURATION=19500            # 5h25m
          RELAY_LEAD_TIME=600            # 提前 10 分鐘 self-trigger 接力(即跑到 5h15m 觸發、5h25m 退出)
          END=$(( $(date +%s) + LOOP_DURATION ))
          CONSECUTIVE_FAILS=0
          ITERATION=0
          RELAY_TRIGGERED=0
          while [ $(date +%s) -lt $END ]; do
            ITERATION=$((ITERATION + 1))
            echo "::group::Iteration ${ITERATION} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            START=$(date +%s)
            if python baseball_notifier.py; then
              CONSECUTIVE_FAILS=0
              echo "::endgroup::"
            else
              EXIT_CODE=$?
              CONSECUTIVE_FAILS=$((CONSECUTIVE_FAILS + 1))
              echo "[ERR] iteration ${ITERATION} exited ${EXIT_CODE}, consecutive_fails=${CONSECUTIVE_FAILS}"
              echo "::endgroup::"
              if [ "$CONSECUTIVE_FAILS" = "1" ]; then
                MSG=$(printf '⚠️ Baseball Notifier 單輪失敗\nexit code: %s\nlog: %s\n迴圈仍在跑,稍後會再試' "${EXIT_CODE}" "${RUN_URL}")
                curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                  --data-urlencode "chat_id=${TG_CHAT_ID}" \
                  --data-urlencode "text=${MSG}" >/dev/null || true
              fi
            fi
            POLL_INTERVAL=$(python3 -c "import json,sys; sys.stdout.write(str(json.load(open('state.json')).get('_next_poll_interval', $DEFAULT_INTERVAL)))" 2>/dev/null || echo $DEFAULT_INTERVAL)
            ELAPSED=$(( $(date +%s) - START ))
            SLEEP=$(( POLL_INTERVAL - ELAPSED ))
            REMAINING=$(( END - $(date +%s) ))

            # ⭐ self-trigger relay run 提前接力(避免靠 GHA cron,因為實測 cron 會延遲 1-2 小時)
            if [ "$RELAY_TRIGGERED" = "0" ] && [ $REMAINING -lt $RELAY_LEAD_TIME ]; then
              echo "Triggering relay run (remaining=${REMAINING}s, run will exit early to hand over)"
              HTTP_STATUS=$(curl -sS -o /tmp/relay_resp.json -w "%{http_code}" -X POST \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${GH_REPO}/actions/workflows/baseball.yml/dispatches" \
                -d '{"ref":"main"}' || echo "curl_failed")
              echo "Relay trigger HTTP=${HTTP_STATUS}"
              if [ "$HTTP_STATUS" = "204" ]; then
                RELAY_TRIGGERED=1
                echo "Relay triggered OK, exiting loop early so concurrency:cancel-in-progress can hand over cleanly"
                break
              else
                echo "Relay trigger FAILED (response below); will rely on cron fallback or retry next iter"
                cat /tmp/relay_resp.json 2>/dev/null || true
                # 不 break,繼續跑直到 LOOP_DURATION 結束(讓 cron 接手)
              fi
            fi

            if [ $REMAINING -lt $POLL_INTERVAL ]; then
              echo "Loop ending: remaining ${REMAINING}s < interval ${POLL_INTERVAL}s"
              break
            fi
            echo "Next iteration in ${SLEEP}s (poll_interval=${POLL_INTERVAL}s, remaining=${REMAINING}s)"
            if [ $SLEEP -gt 0 ]; then
              sleep $SLEEP
            fi
          done
          echo "Loop finished after ${ITERATION} iterations (relay_triggered=${RELAY_TRIGGERED})"

      # 不論 success / failure / cancel,都把最新 state 存回 cache
      - name: Save state cache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: baseball-state-${{ github.run_id }}

      # workflow 整段失敗(不是單輪失敗 — 那個 loop 內部已處理)時推 TG
      - name: Notify Telegram on workflow failure
        if: ${{ failure() }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MSG=$(printf '🚨 Baseball Notifier workflow 整段失敗(非單輪失敗)\nrun id: %s\n時間: %s\n詳細 log: https://github.com/%s/actions/runs/%s\n請手動檢查並重新觸發 workflow' "${{ github.run_id }}" "$(date -u +'%Y-%m-%d %H:%M UTC')" "${{ github.repository }}" "${{ github.run_id }}")
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}" >/dev/null || true
