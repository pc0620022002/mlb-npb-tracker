name: Baseball Notifier

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# 防止前一輪還沒跑完就觸發下一輪(若本輪卡住、後一輪會等)
concurrency:
  group: baseball-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    # 整個 job 上限 6 分鐘,超過就被 GitHub 強殺,跟原本 main() 內的 watchdog 雙重保險
    timeout-minutes: 6
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # state.json 用 cache 跨 run 共享(不進 git history)
      # 每次 run 用唯一 key 寫,fallback 抓最新的同前綴 cache 讀
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: baseball-state-${{ github.run_id }}
          restore-keys: |
            baseball-state-

      - name: Run notifier
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python baseball_notifier.py

      # 失敗時推 TG 警告(curl 本身失敗也不影響 step,避免 nested failure)
      - name: Notify Telegram on failure
        if: ${{ failure() }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MSG="⚠️ Baseball Notifier 雲端執行失敗
          run id: ${{ github.run_id }}
          時間: $(date -u +'%Y-%m-%d %H:%M UTC')
          詳細 log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          下次 cron 5 分鐘內會自動重試,若連續失敗請手動檢查"
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            > /dev/null || true
