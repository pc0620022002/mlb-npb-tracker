name: Baseball Notifier

on:
  schedule:
    # 每 6 小時 fallback(萬一 self-trigger 全部失敗的最後保險)
    # 不能太頻繁:每次 schedule cron 觸發都會 concurrency cancel 健康的舊 run,
    # 新 run cache restore 跟舊 run cache save 之間有 GHA index eventual-consistency
    # race window,踩到就會誤觸 [系統健檢] 假警報。Self-trigger 在 2h42m 處主動接力,
    # 正常完全不需要 schedule cron 介入;只在 self-trigger 全部失敗時 cron 兜底。
    - cron: '17 */6 * * *'
  workflow_dispatch:

# self-trigger relay 需要 actions:write;cache 用 default contents:read 即可
permissions:
  contents: read
  actions: write

# 新 run 觸發時取消舊 run(配合 save-always cache,確保 state 在 cancel 時也存到)
concurrency:
  group: baseball-notifier
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    # 整個 job 上限 5h55m(6 小時減 5 分鐘 margin)
    timeout-minutes: 355
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # state.json 跨 run 共享。用 restore + save 分開,save 放後面 always() 確保 cancel/timeout 也存
      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: baseball-state-${{ github.run_id }}
          restore-keys: |
            baseball-state-

      # 不靠 GHA cron 接力(實測延遲 1-2 小時,造成空白 stall)。
      # 改在 run 內主動 self-trigger 接力 run:跑到剩 RELAY_LEAD_TIME 時呼叫 GHA API
      # workflow_dispatch 觸發新 run,新 run 啟動後 concurrency cancel 舊 run,
      # 舊 run 的 save-always cache step 仍會 fire 把最新 state 存進去,新 run restore 接續。
      # cron `17 */6 * * *` 是 fallback,若 self-trigger 失敗最多 6 小時恢復。
      - name: Polling loop
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # healthchecks.io dead-man's-switch:每輪成功 ping,失敗 ping /fail。
          # GHA runner 完全派不到時(2026-05-05 那種),這個 ping 不會發 → healthchecks
          # 60 分鐘後 email 警告 user。這是「11 層保險全失靈時」的最後一道。
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          DEFAULT_INTERVAL=120           # 預設 2 分鐘(有比賽);程式跑完會更新 state.json
          LOOP_DURATION=19500            # 5h25m,run 內部跑迴圈的總時長
          RELAY_PROACTIVE_AT=9750        # 跑到一半(2h42m)就開始嘗試 self-trigger relay
          RELAY_RETRY_GAP=600            # 每 10 分鐘嘗試一次,共有約 16 次機會
          START_TS=$(date +%s)
          END=$(( START_TS + LOOP_DURATION ))
          CONSECUTIVE_FAILS=0
          ITERATION=0
          RELAY_TRIGGERED=0
          LAST_RELAY_ATTEMPT=0
          RELAY_ATTEMPT_COUNT=0
          while [ $(date +%s) -lt $END ]; do
            ITERATION=$((ITERATION + 1))
            echo "::group::Iteration ${ITERATION} at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            START=$(date +%s)
            if python baseball_notifier.py; then
              CONSECUTIVE_FAILS=0
              echo "::endgroup::"
              # ping healthchecks.io 成功訊號(timeout 5s, fail-silent 不影響主流程)
              if [ -n "$HEALTHCHECK_URL" ]; then
                curl -fsS -m 5 --retry 2 -o /dev/null "$HEALTHCHECK_URL" || echo "[WARN] healthcheck ping failed (non-fatal)"
              fi
            else
              EXIT_CODE=$?
              CONSECUTIVE_FAILS=$((CONSECUTIVE_FAILS + 1))
              echo "[ERR] iteration ${ITERATION} exited ${EXIT_CODE}, consecutive_fails=${CONSECUTIVE_FAILS}"
              echo "::endgroup::"
              # ping /fail 讓 healthchecks 知道是「跑了但失敗」(跟「整段沒跑」區分)
              if [ -n "$HEALTHCHECK_URL" ]; then
                curl -fsS -m 5 --retry 2 -o /dev/null "${HEALTHCHECK_URL}/fail" || echo "[WARN] healthcheck /fail ping failed (non-fatal)"
              fi
              if [ "$CONSECUTIVE_FAILS" = "1" ]; then
                MSG=$(printf '⚠️ Baseball Notifier 單輪失敗\nexit code: %s\nlog: %s\n迴圈仍在跑,稍後會再試' "${EXIT_CODE}" "${RUN_URL}")
                curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                  --data-urlencode "chat_id=${TG_CHAT_ID}" \
                  --data-urlencode "text=${MSG}" >/dev/null || true
              fi
            fi
            POLL_INTERVAL=$(python3 -c "import json,sys; sys.stdout.write(str(json.load(open('state.json')).get('_next_poll_interval', $DEFAULT_INTERVAL)))" 2>/dev/null || echo $DEFAULT_INTERVAL)
            ELAPSED=$(( $(date +%s) - START ))
            SLEEP=$(( POLL_INTERVAL - ELAPSED ))
            REMAINING=$(( END - $(date +%s) ))

            # ⭐ self-trigger relay:跑到 RELAY_PROACTIVE_AT(2h42m,跑到一半)就開始嘗試
            #    每 RELAY_RETRY_GAP(10 分鐘)試一次,共有 ~16 次機會直到 LOOP_DURATION 結束
            #    第一次 204 成功 → RELAY_TRIGGERED=1;新 run 啟動後 concurrency 會 cancel 我,save-always cache 仍會 fire
            #    舊版只在「剩 10 分鐘」試 3 次,如果那 30 秒剛好 GHA API 抖動就全敗 → 空白
            NOW_TS=$(date +%s)
            ELAPSED_SINCE_START=$((NOW_TS - START_TS))
            if [ "$RELAY_TRIGGERED" = "0" ] && [ $ELAPSED_SINCE_START -gt $RELAY_PROACTIVE_AT ] && [ $((NOW_TS - LAST_RELAY_ATTEMPT)) -gt $RELAY_RETRY_GAP ]; then
              RELAY_ATTEMPT_COUNT=$((RELAY_ATTEMPT_COUNT + 1))
              echo "Self-trigger relay attempt #${RELAY_ATTEMPT_COUNT} (elapsed=${ELAPSED_SINCE_START}s of ${LOOP_DURATION}s)"
              LAST_RELAY_ATTEMPT=$NOW_TS
              HTTP_STATUS=$(curl -sS -o /tmp/relay_resp.json -w "%{http_code}" -X POST \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${GH_REPO}/actions/workflows/baseball.yml/dispatches" \
                -d '{"ref":"main"}' || echo "curl_failed")
              echo "  HTTP=${HTTP_STATUS}"
              if [ "$HTTP_STATUS" = "204" ]; then
                RELAY_TRIGGERED=1
                echo "Relay triggered OK on attempt #${RELAY_ATTEMPT_COUNT};新 run 即將啟動 → concurrency 將 cancel 此 run"
                # 不 break — 讓最後幾分鐘 polling 仍在跑,等新 run 啟動 cancel 我;always-save fire
              else
                cat /tmp/relay_resp.json 2>/dev/null || true
                echo "  attempt failed; will retry in ${RELAY_RETRY_GAP}s"
              fi
            fi

            # 如果 LOOP_DURATION 快結束(剩 < POLL_INTERVAL)且 self-trigger 從未成功 → 推 TG + break
            if [ "$RELAY_TRIGGERED" = "0" ] && [ $REMAINING -lt $POLL_INTERVAL ]; then
              MSG=$(printf '🚨 self-trigger relay 全程 %s 次嘗試都失敗\nrun: %s\n只能等 cron fallback(最多 1 小時)接手\n請檢查 GHA API / GITHUB_TOKEN actions:write 權限' "${RELAY_ATTEMPT_COUNT}" "${RUN_URL}")
              curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                --data-urlencode "chat_id=${TG_CHAT_ID}" \
                --data-urlencode "text=${MSG}" >/dev/null || true
              echo "All ${RELAY_ATTEMPT_COUNT} relay attempts failed; cron will pick up within 1h"
            fi

            if [ $REMAINING -lt $POLL_INTERVAL ]; then
              echo "Loop ending: remaining ${REMAINING}s < interval ${POLL_INTERVAL}s"
              break
            fi
            echo "Next iteration in ${SLEEP}s (poll_interval=${POLL_INTERVAL}s, remaining=${REMAINING}s)"
            if [ $SLEEP -gt 0 ]; then
              sleep $SLEEP
            fi
          done
          echo "Loop finished after ${ITERATION} iterations (relay_triggered=${RELAY_TRIGGERED})"

      # 不論 success / failure / cancel,都把最新 state 存回 cache
      - name: Save state cache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: baseball-state-${{ github.run_id }}

      # workflow 整段失敗(非單輪失敗)時:推 TG 警告 + 自動 trigger 接班 run
      # B 保險:run 中段 crash(watchdog kill / OOM / setup error)沒走到 self-trigger 也能自動接班
      - name: Notify Telegram + auto-trigger relay on workflow failure
        if: ${{ failure() }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 先嘗試自動觸發接班 run(失敗也不影響後續 TG 推播)
          echo "Attempting auto-relay on failure..."
          RELAY_HTTP=$(curl -sS -o /tmp/relay.json -w "%{http_code}" -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GH_REPO}/actions/workflows/baseball.yml/dispatches" \
            -d '{"ref":"main"}' || echo "curl_failed")
          echo "auto-relay HTTP=${RELAY_HTTP}"
          if [ "$RELAY_HTTP" = "204" ]; then
            RELAY_NOTE="✅ 已自動觸發接班 run,1-2 分鐘內接手"
          else
            RELAY_NOTE="❌ 自動接班失敗 (HTTP ${RELAY_HTTP});等 cron fallback(最多 1h)接手"
            cat /tmp/relay.json 2>/dev/null || true
          fi
          MSG=$(printf '🚨 Baseball Notifier workflow 整段失敗(非單輪失敗)\nrun id: %s\n時間: %s\n詳細 log: https://github.com/%s/actions/runs/%s\n%s' "${{ github.run_id }}" "$(date -u +'%Y-%m-%d %H:%M UTC')" "${{ github.repository }}" "${{ github.run_id }}" "${RELAY_NOTE}")
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=${MSG}" >/dev/null || true
